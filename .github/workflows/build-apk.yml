name: Build APK

# Construit l'APK Pluxy (mobile + Android TV) :
#  - à chaque push sur main touchant le client (ou le workflow) -> artifact ;
#  - manuellement depuis l'onglet Actions (Run workflow) ;
#       · « publish_release = true » -> crée en plus le tag v<version> ET la
#         Release GitHub (notes = RELEASE_NOTES.md), APK attachée.
#  - sur un tag v* déjà existant -> publie aussi la Release.
on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publier une Release (tag v<version> + APK) ?"
        type: boolean
        default: false

permissions:
  contents: write   # créer le tag + la Release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client/**/*.gradle*', 'client/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Lire la version (versionName)
        id: ver
        run: |
          VER=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Pluxy version: $VER"

      - name: Build APK (debug, signée clé stable)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --console=plain --warning-mode=none

      - name: Renommer l'APK
        run: |
          mkdir -p ../dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             "../dist/Pluxy-${{ steps.ver.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pluxy-${{ steps.ver.outputs.version }}
          path: dist/Pluxy-${{ steps.ver.outputs.version }}.apk
          if-no-files-found: error

      # Publication d'une Release :
      #   - sur un push de tag v*  (le tag existe déjà), OU
      #   - sur déclenchement manuel avec publish_release = true
      #     (le tag v<version> est alors créé par l'action au commit courant).
      # Le corps de la Release vient de RELEASE_NOTES.md (notes rédigées,
      # comme les versions précédentes).
      - name: Publier la Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Pluxy v${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/Pluxy-${{ steps.ver.outputs.version }}.apk
