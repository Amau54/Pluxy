name: Build APK

# Construit automatiquement l'APK Pluxy (mobile + Android TV) :
#  - à chaque push sur main touchant le client (ou le workflow) ;
#  - manuellement depuis l'onglet Actions ;
#  - sur un tag v* -> publie en plus une Release avec l'APK attachée
#    (le lien « releases/latest » du README pointe alors sur la dernière version).
on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour créer la Release sur tag

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client/**/*.gradle*', 'client/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Lire la version (versionName)
        id: ver
        run: |
          VER=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Pluxy version: $VER"

      - name: Build APK (debug, signée clé stable)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --console=plain --warning-mode=none

      - name: Renommer l'APK
        run: |
          mkdir -p ../dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             "../dist/Pluxy-${{ steps.ver.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pluxy-${{ steps.ver.outputs.version }}
          path: dist/Pluxy-${{ steps.ver.outputs.version }}.apk
          if-no-files-found: error

      # Le corps de la Release = message du tag annoté (comme les versions
      # précédentes, qui ont des notes rédigées).
      - name: Notes de version (message du tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: git tag -l --format='%(contents)' "${{ github.ref_name }}" > ../RELEASE_NOTES.md

      - name: Publier la Release (sur tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Pluxy ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: dist/Pluxy-${{ steps.ver.outputs.version }}.apk
