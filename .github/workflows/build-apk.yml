name: Build APK

# Construit l'APK Pluxy (mobile + Android TV) et publie les Releases :
#  - à chaque push sur main touchant le client (ou le workflow) -> build + artifact ;
#  - si la versionName ne correspond à AUCUNE Release existante, la Release
#    v<version> est créée automatiquement (tag + APK + notes RELEASE_NOTES.md).
#    -> il suffit donc de bumper la version et de pousser sur main pour publier
#       « à la suite ». Les versions déjà publiées ne sont jamais re-créées.
#  - déclenchement manuel (Run workflow) avec publish_release=true -> force la Release ;
#  - push d'un tag v* -> publie aussi la Release.
on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publier une Release (tag v<version> + APK) ?"
        type: boolean
        default: false

permissions:
  contents: write   # créer le tag + la Release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client/**/*.gradle*', 'client/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Lire la version (versionName)
        id: ver
        run: |
          VER=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Pluxy version: $VER"

      - name: Build APK (debug, signée clé stable)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --console=plain --warning-mode=none

      - name: Renommer l'APK
        run: |
          mkdir -p ../dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             "../dist/Pluxy-${{ steps.ver.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pluxy-${{ steps.ver.outputs.version }}
          path: dist/Pluxy-${{ steps.ver.outputs.version }}.apk
          if-no-files-found: error

      # La Release v<version> existe-t-elle déjà ? (évite de re-publier.)
      - name: Release déjà existante ?
        id: relcheck
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ steps.ver.outputs.version }}")
          if [ "$code" = "200" ]; then exists=true; else exists=false; fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"
          echo "Release v${{ steps.ver.outputs.version }} -> HTTP $code (exists=$exists)"

      # Publication :
      #   - push d'un tag v* (le tag existe déjà), OU
      #   - dispatch manuel publish_release=true, OU
      #   - push sur main d'une version pas encore publiée.
      # Le tag v<version> est créé par l'action au commit courant si besoin ;
      # le corps vient de RELEASE_NOTES.md (notes rédigées).
      - name: Publier la Release
        if: >-
          startsWith(github.ref, 'refs/tags/v') ||
          github.event.inputs.publish_release == 'true' ||
          (github.ref == 'refs/heads/main' && steps.relcheck.outputs.exists == 'false')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Pluxy v${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/Pluxy-${{ steps.ver.outputs.version }}.apk
